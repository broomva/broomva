name: Update Contributions Chart

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch: # Manual trigger

jobs:
  update-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate contributions chart
        env:
          GH_TOKEN: ${{ secrets.PAT_1 }}
        run: node scripts/generate-contributions.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contributions.svg
          git diff --staged --quiet || git commit -m "Update contributions chart [skip ci]" && git push
